# Ex4: publish the repo's docs to GitHub Pages automatically on push to main.
# Uses Jekyll so the Markdown (README + per-lecture solutions) renders as HTML.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the site source
        run: |
          mkdir -p _site_src
          # Landing page = the README, rendered by Jekyll.
          cp README.md _site_src/index.md
          # Mirror every solutions.md so the lecture pages are browsable.
          find . -name 'solutions.md' -not -path './_site_src/*' \
            -exec bash -c 'mkdir -p "_site_src/$(dirname "{}")"; cp "{}" "_site_src/{}"' \;
          # Minimal Jekyll config (theme so pages render as HTML).
          cat > _site_src/_config.yml <<'YML'
          title: The Missing Semester — Worked Exercises
          description: Verified solutions to the MIT Missing Semester exercises
          theme: jekyll-theme-minimal
          YML

      - uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./_site_src
          destination: ./_site

      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
